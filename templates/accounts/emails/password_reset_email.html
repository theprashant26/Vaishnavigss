<!DOCTYPE html>
<html lang="en">
<body style="margin:0; padding:24px; font-family:'DM Sans', Arial, sans-serif; background:#FBF5E9; color:#2B1810;">
  <div style="max-width:480px; margin:0 auto; background:#fff; border-radius:8px; padding:32px;">
    <h2 style="font-family:'Fraunces', Georgia, serif; color:#7A1F1F; margin-top:0;">Reset your password</h2>
    <p>Hello {{ user.first_name|default:user.username }},</p>
    <p>We received a request to reset your Vaishnavi Gaushala password.</p>
    <p style="margin:24px 0;">
      <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}"
         style="display:inline-block; background:#7A1F1F; color:#fff; padding:12px 24px; text-decoration:none; border-radius:4px; font-weight:600;">
        Choose a new password
      </a>
    </p>
    <p style="color:#6b5b4a; font-size:14px;">If you didn't request this, please ignore this email — your password will not change.</p>
    <p style="margin-top:32px; color:#6b5b4a; font-size:13px;">&mdash; Vaishnavi Gaushala</p>
  </div>
</body>
</html>
