<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}{{ site_name }}{% endblock %}</title>
</head>
<body style="margin:0; padding:24px; font-family: 'DM Sans', Arial, sans-serif; background:#FBF5E9; color:#2B1810;">
  <div style="max-width:560px; margin:0 auto; background:#fff; border-radius:8px; padding:32px; border-top:4px solid #7A1F1F;">
    <h2 style="font-family:'Fraunces', Georgia, serif; color:#7A1F1F; margin:0 0 16px;">{% block heading %}{{ site_name }}{% endblock %}</h2>
    <div style="font-size:15px; line-height:1.6;">
      {% block body %}{% endblock %}
    </div>
    <hr style="border:0; border-top:1px solid #f0e3c0; margin:32px 0 16px;">
    <p style="font-size:12px; color:#6b5b4a; margin:0;">
      &mdash; {{ site_name }} &middot; <a href="{{ site_domain }}" style="color:#7A1F1F;">{{ site_domain }}</a>
    </p>
  </div>
</body>
</html>
