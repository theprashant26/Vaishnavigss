{% extends 'emails/_base.html' %}
{% block heading %}New newsletter subscriber{% endblock %}
{% block body %}
  <table style="width:100%; border-collapse:collapse; font-size:14px;">
    <tr><td style="padding:6px 0; color:#6b5b4a; width:120px;">Email</td><td style="padding:6px 0;"><strong>{{ submission.email }}</strong></td></tr>
    <tr><td style="padding:6px 0; color:#6b5b4a;">Name</td><td style="padding:6px 0;">{{ submission.name|default:"&mdash;" }}</td></tr>
    <tr><td style="padding:6px 0; color:#6b5b4a;">Source</td><td style="padding:6px 0;">{{ submission.source|default:"unknown" }}</td></tr>
  </table>
  <p style="margin:24px 0 0;">
    <a href="{{ site_domain }}/admin/core/newslettersubscriber/{{ submission.pk }}/change/" style="display:inline-block; background:#7A1F1F; color:#fff; padding:10px 20px; text-decoration:none; border-radius:4px;">View in admin</a>
  </p>
{% endblock %}
