<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Something went wrong &mdash; Vaishnavi Gaushala</title>
<style>
  /* Inlined critical CSS — must work even if base.html or context processors are broken. */
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif;
    margin: 0; padding: 0;
    background: #FBF5E9; color: #2B1810;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  .err {
    max-width: 560px;
    text-align: center;
    padding: 48px 24px;
    background: #fff;
    border-top: 4px solid #7A1F1F;
    border-radius: 8px;
    box-shadow: 0 4px 24px rgba(122, 31, 31, 0.08);
    margin: 24px;
  }
  .err__number {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 4rem; font-weight: 700;
    color: #C9A961; line-height: 1;
    margin: 0 0 8px;
  }
  .err__deva {
    display: block;
    font-size: 0.95rem; color: #6b5b4a;
    margin-bottom: 16px;
  }
  .err h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 1.75rem; color: #7A1F1F;
    margin: 0 0 16px; line-height: 1.25;
  }
  .err p {
    font-size: 1rem; line-height: 1.6;
    color: #2B1810; margin: 0 0 12px;
  }
  .err__actions {
    margin-top: 24px;
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  }
  .err__btn {
    display: inline-block;
    padding: 10px 24px;
    background: #7A1F1F; color: #fff;
    text-decoration: none; border-radius: 4px;
    font-weight: 600; font-size: 0.95rem;
  }
  .err__btn--ghost {
    background: transparent; color: #7A1F1F;
    border: 1.5px solid #7A1F1F;
  }
  .err__footer {
    margin-top: 24px;
    font-size: 0.8rem; color: #6b5b4a;
  }
  .err__footer a { color: #7A1F1F; }
</style>
</head>
<body>
  <main class="err" role="alert">
    <div class="err__number" aria-hidden="true">500</div>
    <span class="err__deva">कुछ गड़बड़ है</span>
    <h1>Something went wrong at our end.</h1>
    <p>This is on us, not you. Our team has been notified and is looking into it.</p>
    <p>Please try again in a few minutes, or head back home.</p>

    <div class="err__actions">
      <a class="err__btn" href="/">Take me home</a>
      <a class="err__btn err__btn--ghost" href="/contact/">Contact us</a>
    </div>

    <div class="err__footer">
      Or write to <a href="mailto:seva@vaishnavigss.com">seva@vaishnavigss.com</a>
      &mdash; please mention the page you were on.
    </div>
  </main>
</body>
</html>
