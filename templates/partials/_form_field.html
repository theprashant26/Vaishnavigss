{# Reusable field renderer. Args: field, label, [span2=True] for full-width fields, [optional=False] #}
<div{% if span2 %} class="span-2"{% endif %}>
  <label for="{{ field.id_for_label }}" class="form-label-vai">{{ label }}{% if optional %} <span class="text-muted-soft">(optional)</span>{% endif %}</label>
  {{ field }}
  {% if field.errors %}<div class="field-error">{{ field.errors|join:" " }}</div>{% endif %}
  {% if field.help_text %}<small class="text-muted-soft">{{ field.help_text }}</small>{% endif %}
</div>
