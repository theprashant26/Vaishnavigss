# nginx config for Vaishnavi Gaushala — install at /etc/nginx/sites-available/vaishnavigss,
# then symlink into /etc/nginx/sites-enabled/.
#
# This file is HTTP-only by design. `certbot --nginx` (DEPLOY.md step 9)
# inspects the running config, adds a `listen 443 ssl http2` block with the
# correct `ssl_certificate` + `ssl_certificate_key` paths it just issued, and
# adds the HTTP->HTTPS redirect to this server block — all in place. Shipping
# a port-443 listener up front would fail `nginx -t` on a fresh box because
# the cert files don't exist yet, and the earlier `http2 on;` directive is
# nginx 1.25.1+ only (Ubuntu 24.04 ships nginx 1.24, so it's a hard error).
#
# Customize before installing:
#   - server_name (replace with your real domain)
#   - alias paths under /static/ and /media/ (replace /home/vaishnavi/... with
#     wherever the project lives on the server)
#   - upstream port if you change gunicorn's --bind in the systemd unit

upstream vaishnavi_app {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name vaishnavigss.com www.vaishnavigss.com;

    # Uploads: product photos, cow photos. Bumped from 1M default for ImageField uploads.
    client_max_body_size 20M;

    # Compress text payloads. WhiteNoise also pre-compresses static; this
    # covers dynamic HTML/JSON from Django.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/xml application/rss+xml image/svg+xml;

    # Static files — served directly by nginx, NOT WhiteNoise.
    # WhiteNoise still runs in front of Django so the same paths work in
    # one-process dev/PaaS, but nginx is faster for VPS deploys.
    location /static/ {
        alias /home/vaishnavi/vaishnavi-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files — never executable. Set MEDIA_ROOT in .env if not at default.
    location /media/ {
        alias /home/vaishnavi/vaishnavi-backend/media/;
        expires 7d;
        access_log off;
    }

    # Robots and sitemap are handled by Django (need dynamic SITE_DOMAIN).
    # No nginx aliasing — just proxy through.

    # Healthcheck — log silently to keep access logs clean.
    location = /healthz/ {
        access_log off;
        proxy_pass http://vaishnavi_app;
        proxy_set_header Host $host;
    }

    # Razorpay webhook — POST endpoint with raw body for HMAC verification.
    # Standard proxy is fine; just make sure body buffering doesn't strip the bytes.
    location = /cart/checkout/webhook/razorpay/ {
        proxy_pass http://vaishnavi_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering on;
    }

    # Everything else — proxy to gunicorn.
    location / {
        proxy_pass http://vaishnavi_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }
}
