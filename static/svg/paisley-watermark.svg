<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none" aria-hidden="true">
  <!-- Paisley + temple-silhouette watermark.
       Used as a low-opacity (~6%) section backdrop.
       Render with currentColor; let CSS choose tint. -->
  <g stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round">
    <!-- Main paisley body (mango/buti shape) -->
    <path d="M200 60
             C 130 60, 80 130, 80 220
             C 80 290, 130 340, 200 340
             C 260 340, 300 300, 300 240
             C 300 200, 270 170, 230 170
             C 200 170, 180 190, 180 215
             C 180 235, 200 245, 215 240"/>
    <!-- Inner curl -->
    <path d="M200 100
             C 150 100, 110 150, 110 215
             C 110 270, 150 310, 200 310
             C 240 310, 270 280, 270 240
             C 270 210, 250 195, 230 195" opacity="0.7"/>
    <!-- Decorative leaves around the body -->
    <path d="M160 90 C 145 85, 130 95, 130 115 C 145 110, 160 100, 160 90 Z"/>
    <path d="M240 90 C 255 85, 270 95, 270 115 C 255 110, 240 100, 240 90 Z"/>
    <path d="M100 200 C 85 195, 70 215, 75 235 C 90 225, 100 215, 100 200 Z"/>
    <path d="M320 240 C 335 240, 345 260, 335 280 C 325 265, 320 250, 320 240 Z"/>
    <path d="M180 350 C 170 365, 180 380, 200 378 C 195 365, 188 355, 180 350 Z"/>
    <!-- Inner ornament dots -->
    <circle cx="200" cy="200" r="3" fill="currentColor" stroke="none"/>
    <circle cx="200" cy="270" r="2" fill="currentColor" stroke="none"/>
    <circle cx="170" cy="180" r="1.5" fill="currentColor" stroke="none"/>
    <circle cx="230" cy="180" r="1.5" fill="currentColor" stroke="none"/>
    <!-- Stylized petal at top of paisley -->
    <path d="M200 60 L195 40 L200 30 L205 40 Z" fill="currentColor" stroke="none"/>
  </g>
</svg>
