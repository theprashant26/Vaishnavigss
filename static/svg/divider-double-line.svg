<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 20" fill="none" aria-hidden="true">
  <!-- Thin double horizontal rule with center diamond.
       Use anywhere we'd otherwise use a plain <hr>. -->
  <line x1="0"   y1="8"  x2="100" y2="8"  stroke="currentColor" stroke-width="0.8"/>
  <line x1="0"   y1="12" x2="100" y2="12" stroke="currentColor" stroke-width="0.8"/>
  <line x1="140" y1="8"  x2="240" y2="8"  stroke="currentColor" stroke-width="0.8"/>
  <line x1="140" y1="12" x2="240" y2="12" stroke="currentColor" stroke-width="0.8"/>
  <!-- Center diamond -->
  <path d="M120 4 L128 10 L120 16 L112 10 Z" fill="currentColor"/>
  <circle cx="120" cy="10" r="2" fill="var(--color-bg, #FBF5E9)"/>
</svg>
