<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 180" aria-label="Vaishnavi Gau Seva Gausansthan">
  <!-- Placeholder logo mark.
       Swap with the real PNG/SVG when supplied.
       Composition: round maroon medallion enclosing a stylised cow,
       lotus-dot crown on top, gold wordmark below. -->
  <defs>
    <radialGradient id="mark-bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#FBF5E9"/>
      <stop offset="100%" stop-color="#F4EBD6"/>
    </radialGradient>
  </defs>

  <!-- Lotus crown -->
  <g transform="translate(110 16)" fill="none" stroke="#C9A961" stroke-width="1.2">
    <path d="M0 -8 C -4 -2, -4 2, 0 6 C 4 2, 4 -2, 0 -8 Z"/>
    <path d="M-12 0 C -8 -4, -4 -4, 0 0 C -4 4, -8 4, -12 0 Z"/>
    <path d="M12 0 C 8 -4, 4 -4, 0 0 C 4 4, 8 4, 12 0 Z"/>
    <circle cx="0" cy="0" r="2.2" fill="#7A1F1F" stroke="none"/>
  </g>

  <!-- Medallion -->
  <circle cx="110" cy="80" r="50" fill="url(#mark-bg)" stroke="#7A1F1F" stroke-width="2.5"/>
  <circle cx="110" cy="80" r="44" fill="none" stroke="#C9A961" stroke-width="0.8"/>

  <!-- Simplified cow silhouette inside medallion -->
  <g transform="translate(80 56)" fill="#7A1F1F">
    <!-- body -->
    <path d="M8 30
             C 4 28, 2 22, 6 18
             L 10 14
             L 16 10
             L 30 10
             L 42 12
             L 52 18
             C 56 22, 56 28, 52 32
             L 50 38
             L 44 40
             L 14 40
             L 10 36 Z"/>
    <!-- head -->
    <path d="M52 18
             C 56 14, 60 14, 62 18
             L 64 22
             L 62 28
             L 56 28 Z"/>
    <!-- horns -->
    <path d="M58 14 L60 8 L62 14 Z" fill="#C9A961"/>
    <!-- ear -->
    <path d="M54 16 L58 14 L57 19 Z"/>
    <!-- legs -->
    <rect x="14" y="38" width="3" height="10"/>
    <rect x="22" y="38" width="3" height="10"/>
    <rect x="36" y="38" width="3" height="10"/>
    <rect x="44" y="38" width="3" height="10"/>
    <!-- small calf in front (silhouette suggestion) -->
    <ellipse cx="20" cy="38" rx="6" ry="4" fill="#C9A961" opacity="0.85"/>
    <!-- hand-print accent (sacred mark) -->
    <circle cx="34" cy="22" r="2" fill="#B33A2A"/>
  </g>

  <!-- Wordmark (Hindi) -->
  <text x="110" y="156"
        text-anchor="middle"
        font-family="'Tiro Devanagari Hindi', 'Noto Serif Devanagari', serif"
        font-size="26"
        fill="#7A1F1F"
        font-weight="700">वैष्णवी</text>

  <!-- Tagline (English) -->
  <text x="110" y="174"
        text-anchor="middle"
        font-family="'Fraunces', Georgia, serif"
        font-size="9"
        letter-spacing="3"
        fill="#A0843F"
        font-weight="600">GAU SEVA GAUSANSTHAN</text>
</svg>
